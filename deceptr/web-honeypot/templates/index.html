<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiGate - Secure VPN Access</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #1a1b1e;
            background-image: linear-gradient(135deg, #1a1b1e 0%, #2a2c33 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .login-container {
            background: rgba(30, 32, 38, 0.95);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: #ea192a;
            border-radius: 4px;
            display: inline-block;
            position: relative;
        }
        .logo-icon::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
        }

        .portal-title {
            color: #8fa3c0;
            font-size: 14px;
            margin-top: 5px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8fa3c0;
            font-size: 13px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background-color: #121316;
            border: 1px solid #3d4f6b;
            border-radius: 4px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ea192a;
            box-shadow: 0 0 0 2px rgba(234, 25, 42, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #ea192a;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #c91423;
        }

        .error-message {
            background-color: rgba(234, 25, 42, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(234, 25, 42, 0.3);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: left;
            display: {% if error %}block{% else %}none{% endif %};
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #5b6982;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo-text">
                <span class="logo-icon"></span>
                FortiGate
            </div>
            <div class="portal-title">SSL-VPN Portal</div>
        </div>

        <div class="error-message">
            Invalid username or password. Please try again.
        </div>

        <form method="POST" action="/">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="submit-btn">Login</button>
        </form>

        <div class="footer">
            &copy; Fortinet, Inc. All Rights Reserved.
        </div>
    </div>
</body>
</html>
