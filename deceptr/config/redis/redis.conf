# ============================================================
# DECEPTR v1 — Configuration Redis
# Tampon anti-perte d'événements avec persistance AOF
# ============================================================

# Réseau
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 300
tcp-keepalive 300

# Authentification
requirepass VotreMotDePasseRedis2026!

# Persistance AOF (anti-perte)
appendonly yes
appendfilename "deceptr-aof.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Persistance RDB (backup)
save 900 1
save 300 10
save 60 10000
dbfilename deceptr-dump.rdb
dir /data

# Mémoire
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Sécurité
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
