name: DECEPTR - Successful SSH Credential Use
type: any
index: "cowrie-*"

filter:
- term:
    event_type: "login_success"

alert:
- "slack"

slack:
slack_webhook_url: "https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX"

alert_text_type: alert_text_only
alert_text: "⚠️ *CREDENTIAL COMPROMISE* ⚠️\nAttacker at `{0}` logged in successfully as `{1}`."
alert_text_args:
- "src_ip"
- "username"
