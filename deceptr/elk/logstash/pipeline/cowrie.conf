
input {
  beats {
    port => 5044
    ssl_enabled => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash.key"
    ssl_supported_protocols => ["TLSv1.2", "TLSv1.3"]
  }
}

filter {
  # Traiter les logs Cowrie et Dionaea
  if "cowrie" not in [tags] and "dionaea" not in [tags] {
    drop {}
  }

  # Parser le timestamp Cowrie
  date {
    match    => ["timestamp", "ISO8601"]
    target   => "@timestamp"
    timezone => "UTC"
  }

  # Renommer src_ip pour la carte Kibana
  if [src_ip] {
    mutate { copy => { "src_ip" => "[source][ip]" } }
  }

  # Supprimer les champs Filebeat inutiles
  mutate {
    remove_field => ["agent", "ecs", "input", "log", "host"]
  }
}

output {
  redis {
    host => "redis"
    port => 6379
    password => "${REDIS_PASSWORD}"
    data_type => "list"
    key => "${REDIS_QUEUE}"
    codec => json
  }

  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    # Index mensuel : cowrie-2025.01, cowrie-2025.02...
    index    => "cowrie-%{+YYYY.MM}"
    ssl_enabled => false
  }
}
